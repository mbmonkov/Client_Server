<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .profile-container { background: white; max-width: 500px; margin: 0 auto; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .section { margin-bottom: 20px; border-bottom: 1px solid #ddd; padding-bottom: 20px; }
        input { width: 95%; padding: 8px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; }
        .btn-update { background: #ffc107; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; width: 100%; }
        .btn-update:hover { background: #e0a800; }
        .logout { color: red; text-decoration: none; float: right; font-weight: bold; }
        .msg { color: green; font-weight: bold; margin-bottom: 10px; }
        .error { color: red; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="profile-container">
        <a href="/logout" class="logout">Logout</a>
        <h2>Hello, {{first_name}}!</h2>
        <p>Your email: <strong>{{email}}</strong></p>

        <p class="msg">{{msg}}</p>
        <p class="error">{{error}}</p>

        <div class="section">
            <h3>Change Names</h3>
            <form action="/update_profile" method="POST">
                <label>First Name:</label>
                <input type="text" name="first_name" value="{{first_name}}" required>
                <label>Last Name:</label>
                <input type="text" name="last_name" value="{{last_name}}" required>
                <button type="submit" class="btn-update">Update Names</button>
            </form>
        </div>

        <div class="section">
            <h3>Change Password</h3>
            <form action="/update_password" method="POST">
                <label>New Password:</label>
                <input type="password" name="new_password" placeholder="At least 8 characters, uppercase and digit" required>
                <button type="submit" class="btn-update">Change Password</button>
            </form>
        </div>
    </div>
</body>
</html>
